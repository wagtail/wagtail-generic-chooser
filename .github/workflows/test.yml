
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# Current configuration:
# - django 5.2, python 3.10, wagtail 7.0, postgres
# - django 5.2, python 3.12, wagtail 7.3, sqlite
# - django 6.0, python 3.13, wagtail 7.4, postgres
# - django 6.0, python 3.14, wagtail main, sqlite (allow failures)
jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        include:
          - python: "3.10"
            django: "Django>=5.2,<5.3"
            wagtail: "wagtail>=7.0,<7.1"
            database: "postgresql"
            experimental: false
          - python: "3.12"
            django: "Django>=5.2,<5.3"
            wagtail: "wagtail>=7.3,<7.4"
            database: "sqlite3"
            experimental: false
          - python: "3.13"
            django: "Django>=6.0,<6.1"
            wagtail: "wagtail>=7.4,<7.5"
            database: "postgresql"
            experimental: false

          - python: "3.14"
            django: "Django>=6.0,<6.1"
            wagtail: "git+https://github.com/wagtail/wagtail.git@main#egg=wagtail"
            database: "sqlite3"
            experimental: true

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "psycopg>=3.1.8"
          pip install "${{ matrix.django }}"
          pip install "${{ matrix.wagtail }}"
          pip install -e .
      - name: Test
        run: ./runtests.py
        env:
          DATABASE_ENGINE: django.db.backends.${{ matrix.database }}
          DATABASE_HOST: localhost
          DATABASE_USER: postgres
          DATABASE_PASS: postgres
