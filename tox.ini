[tox]
envlist =
    ; Django 5.2, supported Wagtail versions (LTS + latest)
    py{310,311,312,313}-django52-wagtail{70,74}
    ; Django 6.0, supported Wagtail versions (Django 6.0 support was added in Wagtail 7.3)
    py{312,313,314}-django60-wagtail{73,74}

[testenv]
basepython =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py314: python3.14
env =
    PYTHONWARNINGS=always::DeprecationWarning
commands = python -Wall runtests.py {posargs}
deps =
    django52: Django>=5.2,<5.3
    django60: Django>=6.0,<6.1
    wagtail70: wagtail>=7.0,<7.1
    wagtail73: wagtail>=7.3,<7.4
    wagtail74: wagtail>=7.4,<7.5

[testenv:future]
basepython = python3.14
env =
    PYTHONWARNINGS=always::DeprecationWarning
deps =
    ; Test compatibility with development versions of Django and Wagtail.
    https://github.com/django/django/archive/refs/heads/main.zip
    https://github.com/wagtail/wagtail/archive/refs/heads/main.zip
commands_pre =
    pip freeze
commands = python -Wall runtests.py {posargs}
